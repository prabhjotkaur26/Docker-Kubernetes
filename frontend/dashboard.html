<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #75f6ff, #75ffd6);
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    table {
      width: 90%;
      margin: auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #b175ff;
      color: white;
      padding: 10px;
    }

    td {
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    a {
      color: #75a1ff;
      text-decoration: none;
    }

    .top-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      background: #b575ff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #d6ff75;
    }
  </style>
</head>

<body>

<div class="top-bar">
  <h2>Dashboard</h2>
  <button onclick="goHome()">Back</button>
</div>

<table id="table">
  <tr>
    <th>Short</th>
    <th>Original</th>
    <th>Clicks</th>
  </tr>
</table>

<script>
async function loadLinks() {
  const res = await fetch("/api/links");
  const data = await res.json();

  const table = document.getElementById("table");

  data.forEach(link => {
    const row = `
      <tr>
        <td><a href="/${link.short}" target="_blank">${link.short}</a></td>
        <td>${link.original}</td>
        <td>${link.clicks}</td>
      </tr>
    `;
    table.innerHTML += row;
  });
}

function goHome() {
  window.location.href = "/";
}

loadLinks();
</script>

</body>
</html>
