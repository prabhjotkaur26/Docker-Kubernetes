server {
    listen 80;

    # Serve frontend FIRST
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ @backend;
    }

    # API calls
    location /api/ {
        proxy_pass http://api:3000/;
    }

    # Redirect service fallback
    location @backend {
        proxy_pass http://redirect:3000;
    }
}